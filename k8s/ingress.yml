apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codespace-api-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:5173"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, OPTIONS, DELETE, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
  labels:
    app.kubernetes.io/name: codespace-api-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - pathType: Prefix
        path: "/api/sandbox"
        backend:
          service:
            name: sandbox-service
            port:
              number: 80
      - pathType: Prefix
        path: "/api/ai"
        backend:
          service:
            name: ai-service
            port:
              number: 80
      - pathType: Prefix
        path: "/api/auth"
        backend:
          service:
            name: auth-service
            port:
              number: 80
---
# Separate ingress for wildcard subdomains so WebSocket-specific annotations
# don't conflict with the CORS annotations on the API ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codespace-subdomain-ingress
  annotations:
    # Long timeouts keep WebSocket and SSE connections alive
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    # HTTP/1.1 is required for the Upgrade header to flow through
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Disable buffering so Socket.IO frames and Vite HMR aren't held in nginx buffers
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
  labels:
    app.kubernetes.io/name: codespace-subdomain-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: "*.agent.lvh.me"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: router-service
            port:
              number: 80
  - host: "*.preview.lvh.me"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: router-service
            port:
              number: 80
